<div class="page-enter">
  <div class="page-header">
    <h1><span>Contact</span></h1>
    <p>Une question, une suggestion ? Nous sommes à votre écoute.</p>
  </div>

  <div class="container contact-layout">
    <div class="contact-info">
      <div class="info-item">
        <span class="info-item__icon">📧</span>
        <div>
          <strong>Email</strong>
          <p>contact&#64;musicvault.app</p>
        </div>
      </div>
      <div class="info-item">
        <span class="info-item__icon">💬</span>
        <div>
          <strong>Support</strong>
          <p>Réponse sous 24h ouvrées</p>
        </div>
      </div>
      <div class="info-item">
        <span class="info-item__icon">🌍</span>
        <div>
          <strong>Localisation</strong>
          <p>Paris, France</p>
        </div>
      </div>
    </div>

    <div class="contact-form card">
      <div class="contact-form__inner">
        <h3>Envoyer un message</h3>

        <div *ngIf="sent" class="success-msg">
          ✓ Votre message a bien été envoyé !
        </div>

        <ng-container *ngIf="!sent">
          <div class="form-group">
            <label>Nom</label>
            <input type="text" [(ngModel)]="form.name" placeholder="Votre nom">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="form.email" placeholder="votre@email.com">
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea [(ngModel)]="form.message" placeholder="Votre message..."></textarea>
          </div>
          <button class="btn btn--primary" (click)="send()">
            Envoyer le message
          </button>
        </ng-container>
      </div>
    </div>
  </div>
</div>
