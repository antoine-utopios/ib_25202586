<div class="page-enter container form-page">
  <div class="page-header">
    <h1>Ajouter un <span>album</span></h1>
    <p>Enrichissez votre collection avec un nouvel album.</p>
  </div>

  <div class="form-container">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group">
          <label>Nom de l'album *</label>
          <input type="text" formControlName="nom" placeholder="Ex: Dark Side of the Moon">
          <span class="error-msg" *ngIf="f['nom'].invalid && f['nom'].touched">Le nom est requis</span>
        </div>

        <div class="form-group">
          <label>Interprète *</label>
          <input type="text" formControlName="interprete" placeholder="Ex: Pink Floyd">
          <span class="error-msg" *ngIf="f['interprete'].invalid && f['interprete'].touched">L'interprète est requis</span>
        </div>

        <div class="form-group">
          <label>Date de sortie *</label>
          <input type="date" formControlName="dateSortie">
          <span class="error-msg" *ngIf="f['dateSortie'].invalid && f['dateSortie'].touched">La date est requise</span>
        </div>

        <div class="form-group">
          <label>Genre *</label>
          <select formControlName="genre">
            <option value="" disabled>Choisir un genre</option>
            <option *ngFor="let g of genres" [value]="g">{{ g }}</option>
          </select>
          <span class="error-msg" *ngIf="f['genre'].invalid && f['genre'].touched">Le genre est requis</span>
        </div>

        <div class="form-group">
          <label>Nombre de pistes *</label>
          <input type="number" formControlName="nombrePistes" min="1" placeholder="Ex: 12">
          <span class="error-msg" *ngIf="f['nombrePistes'].invalid && f['nombrePistes'].touched">Minimum 1 piste</span>
        </div>

        <div class="form-group">
          <label>Note (0–5) *</label>
          <input type="number" formControlName="note" min="0" max="5" step="0.5" placeholder="Ex: 4.5">
          <span class="error-msg" *ngIf="f['note'].invalid && f['note'].touched">La note doit être entre 0 et 5</span>
        </div>
      </div>

      <div class="form-group">
        <label>URL de la pochette</label>
        <input type="url" formControlName="imageURL" placeholder="https://exemple.com/image.jpg">
      </div>

      <!-- IMAGE PREVIEW -->
      <div class="image-preview" *ngIf="f['imageURL'].value">
        <img [src]="f['imageURL'].value" alt="Prévisualisation"
             (error)="$any($event.target).style.display='none'">
        <span>Prévisualisation de la pochette</span>
      </div>

      <div *ngIf="error" class="error-banner">{{ error }}</div>

      <div class="form-actions">
        <button type="submit" class="btn btn--primary btn--lg" [disabled]="form.invalid || isSaving">
          <span *ngIf="!isSaving">✚ Ajouter l'album</span>
          <span *ngIf="isSaving">Ajout en cours…</span>
        </button>
        <a routerLink="/album" class="btn btn--ghost btn--lg">Annuler</a>
      </div>
    </form>
  </div>
</div>
